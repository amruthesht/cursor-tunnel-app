[tool.briefcase]
project_name = "cursor-tunnel-app"
bundle = "com.cursor.tunnel.app"
version = "0.0.0"
url = "https://github.com/amruthesht/cursor-tunnel-app"
license = "MIT"
author = "Amruthesh Thirumalaiswamy"
author_email = "athiru12@asu.edu"

[tool.briefcase.app.app]
formal_name = "Cursor Tunnel App"
description = "Dashboard app to connect to and run/manage Cursor tunnels on remote HPC clusters"
sources = ["app"]
resources = ["cluster"]
requires = ["paramiko>=3.4.0"]
console_app = true
icon.square = "resources/square-icon"
icon.round = "resources/round-icon"
icon.adaptive = "resources/adaptive-icon"

[tool.briefcase.app.app.android]
requires = [
    "paramiko>=3.4.0",
    "cryptography==42.0.8",
]
permission.internet = true
permission.access_network_state = true
# 16 KB-aligned cryptography wheels (Chaquopy -0 builds are 4 KB only). See platforms/android/build-apk.sh.
requirement_installer_args = [
    "--find-links", "./platforms/android/wheels",
]

