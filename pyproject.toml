[tool.briefcase]
project_name = "cursor-tunnel-app"
bundle = "com.cursor.tunnel.app"
version = "0.0.0"
url = "https://github.com/amruthesht/cursor-tunnel-app"
license = "MIT"
author = "Amruthesh Thirumalaiswamy"
author_email = "athiru12@asu.edu"

[tool.briefcase.app.app]
