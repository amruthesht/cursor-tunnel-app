name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: python -m pip install -r requirements.txt pyinstaller

      - name: Build CursorTunnelApp.exe
        shell: pwsh
        run: ./platforms/windows/build-exe.ps1

      - name: Write SHA256 checksum
        shell: pwsh
        run: |
          $hash = (Get-FileHash "dist/CursorTunnelApp.exe" -Algorithm SHA256).Hash.ToLower()
          "${hash}  CursorTunnelApp.exe" | Out-File -FilePath "dist/CursorTunnelApp.exe.sha256" -Encoding ascii -NoNewline

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v7
        with:
          name: windows
          path: |
            dist/CursorTunnelApp.exe
            dist/CursorTunnelApp.exe.sha256

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build CursorTunnelApp.app
        run: |
          chmod +x platforms/macos/build-app.sh
          ./platforms/macos/build-app.sh

      - name: Write SHA256 checksum
        run: |
          cd dist
          shasum -a 256 CursorTunnelApp-macos-arm64.zip | tee CursorTunnelApp-macos-arm64.zip.sha256

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v7
        with:
          name: macos
          path: |
            dist/CursorTunnelApp-macos-arm64.zip
            dist/CursorTunnelApp-macos-arm64.zip.sha256

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build CursorTunnelApp binary
        run: |
          chmod +x platforms/linux/build-app.sh
          ./platforms/linux/build-app.sh

      - name: Write SHA256 checksum
        run: |
          cd dist
          shasum -a 256 CursorTunnelApp-linux-x86_64.tar.gz | tee CursorTunnelApp-linux-x86_64.tar.gz.sha256

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v7
        with:
          name: linux
          path: |
            dist/CursorTunnelApp-linux-x86_64.tar.gz
            dist/CursorTunnelApp-linux-x86_64.tar.gz.sha256

  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up Java
        run: echo "JAVA_HOME=${JAVA_HOME_17_X64}" >> "$GITHUB_ENV"

      - name: Build APK
        env:
          CI: true
        run: |
          chmod +x platforms/android/build-apk.sh
          ./platforms/android/build-apk.sh

      - name: Write SHA256 checksum
        run: |
          cd dist
          shasum -a 256 CursorTunnelApp-android.apk | tee CursorTunnelApp-android.apk.sha256

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v7
        with:
          name: android
          path: |
            dist/CursorTunnelApp-android.apk
            dist/CursorTunnelApp-android.apk.sha256

  release:
    needs: [build-windows, build-macos, build-linux, build-android]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/CursorTunnelApp.exe
            dist/CursorTunnelApp.exe.sha256
            dist/CursorTunnelApp-macos-arm64.zip
            dist/CursorTunnelApp-macos-arm64.zip.sha256
            dist/CursorTunnelApp-linux-x86_64.tar.gz
            dist/CursorTunnelApp-linux-x86_64.tar.gz.sha256
            dist/CursorTunnelApp-android.apk
            dist/CursorTunnelApp-android.apk.sha256
          generate_release_notes: true
