name: Build (Windows)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: python -m pip install -r requirements.txt pyinstaller

      - name: Build CursorTunnelApp.exe
        shell: pwsh
        run: ./platforms/windows/build-exe.ps1

      - name: Write SHA256 checksum
        shell: pwsh
        run: |
          $hash = (Get-FileHash "dist/CursorTunnelApp.exe" -Algorithm SHA256).Hash.ToLower()
          "${hash}  CursorTunnelApp.exe" | Out-File -FilePath "dist/CursorTunnelApp.exe.sha256" -Encoding ascii -NoNewline

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: CursorTunnelApp-windows
          path: |
            dist/CursorTunnelApp.exe
            dist/CursorTunnelApp.exe.sha256
